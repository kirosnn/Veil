<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Finder AI</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app" class="shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-actions">
        <button id="new-chat-button" class="button button-primary" type="button">New chat</button>
        <button id="delete-chat-button" class="button button-ghost" type="button">Delete</button>
      </div>
      <div id="session-empty" class="sidebar-empty">No saved conversation yet.</div>
      <div id="session-list" class="session-list"></div>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div class="topbar-left">
          <button id="back-button" class="button button-ghost" type="button">← Finder</button>
          <button id="sidebar-toggle-button" class="button button-icon" type="button">☰</button>
        </div>
        <div class="topbar-right">
          <div class="provider-block">
            <div id="provider-label" class="provider-label"></div>
            <div id="provider-status" class="provider-status"></div>
          </div>
          <div class="model-picker">
            <button id="model-button" class="button button-secondary" type="button">
              <span id="model-button-label">Select model</span>
              <span class="chevron">▾</span>
            </button>
            <div id="model-menu" class="model-menu hidden"></div>
          </div>
        </div>
      </header>

      <section id="empty-state" class="empty-state">
        <div class="empty-title">Ask anything about this machine or this project.</div>
        <div class="empty-copy">Finder AI now runs inside an embedded web surface with a TypeScript UI layer and a TypeScript worker layer.</div>
      </section>

      <section id="conversation" class="conversation hidden">
        <div id="turn-list" class="turn-list"></div>
      </section>

      <footer class="composer-panel">
        <div id="status-row" class="status-row hidden"></div>
        <div class="composer-shell">
          <textarea id="composer" class="composer" rows="1" placeholder="Ask anything about this machine, this project, or the next step..."></textarea>
          <div class="composer-actions">
            <button id="cancel-button" class="button button-ghost hidden" type="button">Cancel</button>
            <button id="send-button" class="button button-primary" type="button">Send</button>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <script type="module" src="./dist/app.js"></script>
</body>
</html>
