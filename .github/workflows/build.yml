name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore
        run: dotnet restore Veil.sln

      - name: Publish
        run: dotnet publish apps/desktop/Veil/Veil.csproj -c Release -r win-x64 -p:Platform=x64 --self-contained false -o artifacts/publish
